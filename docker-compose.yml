version: '3.8'

services:
  gateway:
    build: .
    container_name: translation-gateway
    ports:
      - "6005:6005"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
