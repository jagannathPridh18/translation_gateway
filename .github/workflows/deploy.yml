name: CI/CD — Translation Gateway

on:
  push:
    branches: [production_setup]
  pull_request:
    branches: [production_setup]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/jagannathpridh18/translation-gateway

jobs:
  # ================================================================
  # Stage 1: Lint & Code Quality
  # ================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint with flake8
        run: |
          flake8 gateway/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 gateway/ --count --max-complexity=15 --max-line-length=150 --statistics --exit-zero

      - name: Check syntax
        run: python -c "import ast; ast.parse(open('gateway/service.py').read()); ast.parse(open('gateway/autoscaler.py').read()); print('Syntax OK')"

  # ================================================================
  # Stage 2: Unit Tests
  # ================================================================
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: |
          python -c "
          from gateway.autoscaler import AutoScaler, ServicePool, Pod
          p = Pod(pod_id='test123', service_name='lid', base_url='http://test', port=6001)
          assert p.pod_id == 'test123'
          assert p.is_healthy == False
          assert p.avg_latency_ms == 0
          print('Pod tests passed')

          pool = ServicePool(name='lid', port=6001, template_id='', gpu_type='T4', min_pods=1, max_pods=5)
          assert pool.num_healthy == 0
          assert pool.current_rps == 0
          pool.pods.append(p)
          assert len(pool.pods) == 1
          print('ServicePool tests passed')

          print('All tests passed!')
          "

  # ================================================================
  # Stage 3: Build Docker Image & Push to GHCR
  # ================================================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/production_setup'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ================================================================
  # Stage 4: Deploy to DigitalOcean (pull image + run)
  # ================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            echo "--- Login to GHCR ---"
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "--- Pull latest image ---"
            docker pull ghcr.io/jagannathpridh18/translation-gateway:latest

            echo "--- Stop old container ---"
            docker stop translation-gateway 2>/dev/null || true
            docker rm translation-gateway 2>/dev/null || true

            echo "--- Start new container ---"
            docker run -d \
              --name translation-gateway \
              --restart unless-stopped \
              -p 6005:6005 \
              --env-file /opt/translation_gateway/.env \
              ghcr.io/jagannathpridh18/translation-gateway:latest

            echo "--- Waiting for startup ---"
            sleep 10

            echo "--- Health check ---"
            curl -sf http://localhost:6005/health && echo " Gateway OK" || echo " Gateway starting..."
            echo "--- Deploy complete ---"

  # ================================================================
  # Stage 5: Post-deploy verification
  # ================================================================
  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for service to stabilize
        run: sleep 15

      - name: Verify gateway health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.DO_HOST }}:6005/health)
          echo "Gateway HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Gateway is healthy"
          else
            echo "Gateway returned $HTTP_CODE (may be degraded if RunPod pods are stopped)"
          fi

      - name: Check endpoints
        run: |
          curl -sf http://${{ secrets.DO_HOST }}:6005/docs > /dev/null && echo "Swagger docs accessible" || echo "Swagger not available"
